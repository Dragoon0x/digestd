name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: darwin-arm64
            runner: macos-latest
            bun: bun-darwin-arm64
            ext: ""
          - name: darwin-x64
            runner: macos-13
            bun: bun-darwin-x64
            ext: ""
          - name: linux-x64
            runner: ubuntu-latest
            bun: bun-linux-x64
            ext: ""
          - name: linux-arm64
            runner: ubuntu-latest
            bun: bun-linux-arm64
            ext: ""
          - name: windows-x64
            runner: windows-latest
            bun: bun-windows-x64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: build
        shell: bash
        run: |
          mkdir -p dist
          bun build src/cli.ts \
            --compile \
            --target ${{ matrix.target.bun }} \
            --outfile dist/digestd-${{ matrix.target.name }}${{ matrix.target.ext }}

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: digestd-${{ matrix.target.name }}
          path: dist/digestd-${{ matrix.target.name }}${{ matrix.target.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
